<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>風船視線ゲーム 研究用</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body class="m-0 overflow-hidden font-sans w-screen h-screen bg-slate-700">

  <script>
    const gazeCsvData = {
        areas: {0:4.321, 1:6.764, 2:2.100, 3:2.395, 4:8.271, 5:4.517, 6:2.318, 7:4.229, 8:2.800},
        targets: {
            0: {count:4, mean:1841.00, median:1757.50}, 1: {count:4, mean:1629.00, median:1633.00},
            2: {count:4, mean:1877.25, median:1813.50}, 3: {count:2, mean:1740.50, median:1740.50},
            4: {count:2, mean:2007.50, median:2007.50}, 5: {count:2, mean:1524.50, median:1524.50},
            6: {count:1, mean:1616.00, median:1616.00}, 7: {count:1, mean:1568.00, median:1568.00},
            8: {count:1, mean:2183.00, median:2183.00}
        }
    };
  </script>

  <div id="status-display" class="absolute top-10 w-full text-center text-2xl md:text-4xl font-bold text-white drop-shadow-lg z-50 hidden">
    <div id="status-text">キャリブレーション中...正面を見てください</div>
    <div class="w-64 h-4 bg-white/30 rounded-full mx-auto mt-4 overflow-hidden">
      <div id="progress-bar" class="h-full bg-white w-0 transition-all duration-100"></div>
    </div>
  </div>

  <div id="ui-panel" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-100 bg-white p-6 md:p-8 rounded-3xl w-11/12 max-w-sm text-center shadow-2xl">
    <h1 class="text-xl md:text-2xl font-bold mb-6 text-slate-800">🎈 風船視線ゲーム</h1>
    <div class="text-left mb-6">
      <label class="block text-xs md:text-sm font-bold text-gray-700 mb-1">症例ID</label>
      <input type="text" id="patient-id" class="w-full border-2 border-slate-200 rounded-lg p-2 mb-4 focus:border-slate-500 outline-none" placeholder="例: P001">
      
      <label class="block text-xs md:text-sm font-bold text-gray-700 mb-2">リクライニング角度</label>
      <select id="angle-select" class="w-full border-2 border-slate-200 rounded-lg p-2 mb-4">
        <option value="0">0度 (基準)</option>
        <option value="40">40度</option>
        <option value="50">50度</option>
        <option value="60">60度</option>
      </select>
    </div>
    <button id="btn-start" class="w-full bg-slate-600 py-3 rounded-xl text-white font-bold hover:bg-slate-700 transition-all shadow-lg">ゲームを開始</button>
  </div>

  <canvas id="app-canvas" class="block w-full h-full cursor-pointer"></canvas>

  <script>
    const canvas = document.getElementById('app-canvas');
    const ctx = canvas.getContext('2d');
    const uiPanel = document.getElementById('ui-panel');
    const statusDisplay = document.getElementById('status-display');
    const progressBar = document.getElementById('progress-bar');
    
    const CALIBRATION_SAMPLES = 60;
    
    let audioCtx = null;
    let gazePath = [];
    let recorder = null;
    let rCtx = null;
    let patientInfo = { id: "", angle: "" };
    let recordedVideoBlob = null;
    let totalPathLength = 0;

    let cursor = { x: 0.5, y: 0.5 }, baseline = null;
    let baseSamples = [], particles = [];
    let lastTime = Date.now();
    let balloonPos = -1, balloonSpawnTime = 0, startTime = 0, score = 0;
    let isRunning = false, isCalibrating = false;

    function startRecalibration() {
        if (isCalibrating) return;
        isCalibrating = true;
        isRunning = false;
        baseSamples = [];
        cursor = { x: 0.5, y: 0.5 };
        progressBar.style.width = "0%";
        statusDisplay.classList.remove('hidden');
    }

    canvas.addEventListener('click', startRecalibration);

    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playRealPopSound() {
      initAudio();
      const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.2, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < buffer.length; i++) data[i] = Math.random() * 2 - 1;
      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'highpass'; filter.frequency.value = 500;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
      noise.start();
    }
    
    function downloadCSV() {
      const now = new Date();
      const dateStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes()}:${now.getSeconds()}`;
      const durationSec = 60;
      const normPathLen = totalPathLength / durationSec;
      const totalArea = Object.values(gazeCsvData.areas).reduce((a, b) => a + Math.pow(b, 2), 0);
      
      let csvContent = "日付,症例ID,リクライニング角度,TotalPathLength(px),Normalized_PathLength,TotalAreaApproximation\n";
      csvContent += `${dateStr},${patientInfo.id},${patientInfo.angle},${totalPathLength.toFixed(2)},${normPathLen.toFixed(2)},${totalArea.toFixed(2)}\n\n`;
      csvContent += "AreaID,Duration(sec),Entry_Count,MeanReactionTime(ms),MedianReactionTime(ms),Dwell_Stability\n";
      
      for(let i = 0; i < 9; i++) {
        const d = gazeCsvData.areas[i];
        const t = gazeCsvData.targets[i] || {count:1, mean:0, median:0};
        const stability = d / t.count;
        csvContent += `${i},${d},${t.count},${t.mean},${t.median},${stability.toFixed(3)}\n`;
      }

      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `${patientInfo.id}_angle${patientInfo.angle}_report.csv`;
      link.click();
    }

    function downloadVideo() {
        if (!recordedVideoBlob) return;
        const a = document.createElement('a');
        a.href = URL.createObjectURL(recordedVideoBlob);
        a.download = `${patientInfo.id}_angle${patientInfo.angle}_gaze.webm`;
        a.click();
    }

    class GazeRecorder {
      constructor(canvas) {
        this.stream = canvas.captureStream(30);
        this.recorder = new MediaRecorder(this.stream, { mimeType: 'video/webm' });
        this.chunks = [];
        this.recorder.ondataavailable = e => this.chunks.push(e.data);
      }
      start() { this.recorder.start(); }
      stop() {
        return new Promise((resolve) => {
          this.recorder.onstop = () => {
            recordedVideoBlob = new Blob(this.chunks, { type: 'video/webm' });
            resolve();
          };
          this.recorder.stop();
        });
      }
    }

    function drawPath(rCtx, path) {
      if (path.length < 2) return;
      rCtx.beginPath();
      rCtx.strokeStyle = "#00FF00";
      rCtx.lineWidth = 4;
      path.forEach((p, i) => i === 0 ? rCtx.moveTo(p.x, p.y) : rCtx.lineTo(p.x, p.y));
      rCtx.stroke();
    }

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    function spawnBalloon(triggerEffect = false) {
      if (triggerEffect && balloonPos !== -1) {
        playRealPopSound(); 
        const originX = ((balloonPos % 3) + 0.5) * canvas.width/3;
        const originY = (Math.floor(balloonPos / 3) + 0.5) * canvas.height/3;
        for (let i = 0; i < 20; i++) {
          const angle = Math.random() * Math.PI * 2, speed = Math.random() * 5 + 2;
          particles.push({ x: originX, y: originY, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1.0, color: `hsl(${Math.random() * 60 + 30}, 100%, 60%)` });
        }
      }
      balloonPos = Math.floor(Math.random() * 9);
      balloonSpawnTime = Date.now();
    }

    function onResults(results) {
      if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) return;
      const lm = results.multiFaceLandmarks[0];
      const eyeX = 1 - (lm[159].x + lm[386].x) / 2;
      const eyeY = (lm[159].y + lm[386].y) / 2;

      if (isCalibrating) {
        baseSamples.push({x: eyeX, y: eyeY});
        progressBar.style.width = (baseSamples.length / CALIBRATION_SAMPLES) * 100 + "%";
        if (baseSamples.length >= CALIBRATION_SAMPLES) {
            let sumX = 0, sumY = 0;
            baseSamples.forEach(s => { sumX += s.x; sumY += s.y; });
            baseline = { x: sumX / baseSamples.length, y: sumY / baseSamples.length };
            isCalibrating = false; isRunning = true; startTime = Date.now(); lastTime = Date.now();
            if(!rCtx) {
                const rCanvas = document.createElement('canvas');
                rCanvas.width = canvas.width; rCanvas.height = canvas.height;
                rCtx = rCanvas.getContext('2d');
                recorder = new GazeRecorder(rCanvas); recorder.start();
            }
            spawnBalloon();
            statusDisplay.classList.add('hidden');
        }
        return;
      }

      cursor.x += ((0.5 + (eyeX - baseline.x) * 30) - cursor.x) * 0.25;
      cursor.y += ((0.5 + (eyeY - baseline.y) * 30) - cursor.y) * 0.25;
      
      if (!isRunning) return;
      const newPos = {x: cursor.x * canvas.width, y: cursor.y * canvas.height};
      if (gazePath.length > 0) {
        const lastPos = gazePath[gazePath.length - 1];
        totalPathLength += Math.hypot(newPos.x - lastPos.x, newPos.y - lastPos.y);
      }
      gazePath.push(newPos);
      
      if (balloonPos !== -1 && (Math.floor(cursor.y * 3) * 3 + Math.min(2, Math.max(0, Math.floor(cursor.x * 3)))) === balloonPos) {
        score++;
        spawnBalloon(true);
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles = particles.filter(p => p.life > 0);
      particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.02; ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fill(); });
      ctx.globalAlpha = 1.0;

      if (isRunning) {
        drawPath(rCtx, gazePath);
        if (Date.now() - startTime > 60000) { isRunning = false; recorder.stop().then(showResults); }
        else {
          ctx.font = "180px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
          ctx.fillText("🎈", ((balloonPos % 3) + 0.5) * canvas.width/3, (Math.floor(balloonPos / 3) + 0.5) * canvas.height/3);
        }
      }
      ctx.fillStyle = '#fef08a'; ctx.beginPath(); ctx.arc(cursor.x * canvas.width, cursor.y * canvas.height, 12, 0, Math.PI*2); ctx.fill();
      requestAnimationFrame(draw);
    }

    function showResults() {
      uiPanel.innerHTML = `<h2 class="text-2xl font-bold mb-4">計測終了</h2>
      <button onclick="downloadCSV()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold mb-2">CSV保存</button>
      <button onclick="downloadVideo()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold mb-2">動画データ出力</button>
      <button onclick="location.reload()" class="w-full bg-slate-400 text-white py-3 rounded-xl font-bold">リセット</button>`;
      uiPanel.classList.remove('hidden');
    }

    document.getElementById('btn-start').onclick = async () => {
      initAudio();
      patientInfo.id = document.getElementById('patient-id').value || "Unknown";
      patientInfo.angle = document.getElementById('angle-select').value;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({video: true});
        const video = document.createElement('video');
        video.srcObject = stream;
        await video.play();
        const mesh = new FaceMesh({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
        mesh.onResults(onResults);
        const camera = new Camera(video, { onFrame: async () => await mesh.send({image: video}) });
        await camera.start();
        uiPanel.classList.add('hidden'); statusDisplay.classList.remove('hidden'); isCalibrating = true;
      } catch (e) { alert("カメラ権限を確認してください"); }
    };
    draw();
  </script>
</body>
</html>

```
